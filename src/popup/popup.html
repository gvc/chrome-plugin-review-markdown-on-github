<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h2>MD Review</h2>
    <label class="toggle">
      <input type="checkbox" id="enabled" checked>
      <span>Enabled</span>
    </label>
    <div class="pat-section">
      <details>
        <summary>API Token (optional)</summary>
        <p class="hint">Only needed if session-based commenting fails.</p>
        <input type="password" id="pat" placeholder="ghp_...">
        <button id="save-pat">Save</button>
        <span id="pat-status"></span>
      </details>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
